<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TD Style Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <div class="w-72 bg-black text-white p-8">
      <h1 class="text-3xl font-bold mb-12">TD <span class="text-pink-600">Admin</span></h1>
      <nav class="space-y-6">
        <a href="#" class="flex items-center gap-4 hover:text-pink-500"><i class="fa-solid fa-home"></i> Dashboard</a>
        <a href="#" onclick="showTab('products')" class="flex items-center gap-4 hover:text-pink-500"><i class="fa-solid fa-shirt"></i> Products</a>
      </nav>
    </div>
    <div class="flex-1 p-10 overflow-auto">
      <h2 class="text-4xl font-bold mb-8">Products Management</h2>
      <button onclick="showAddForm()" class="bg-black text-white px-8 py-4 rounded-2xl mb-10 hover:bg-pink-600">+ Add New Product</button>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="product-grid"></div>
    </div>
  </div>
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-10 w-full max-w-lg">
      <h3 class="text-3xl font-bold mb-8">Add New Product</h3>
      <input id="name" placeholder="Product Name" class="w-full p-4 border rounded-2xl mb-4">
      <input id="price" placeholder="Price (LAK)" class="w-full p-4 border rounded-2xl mb-4">
      <select id="category" class="w-full p-4 border rounded-2xl mb-4">
        <option value="clothes">Clothes</option>
        <option value="dress">Dresses</option>
        <option value="shoe">Shoes</option>
        <option value="bag">Bags</option>
        <option value="belt">Belts</option>
        <option value="jewelry">Necklaces & Bracelets</option>
      </select>
      <input id="size" placeholder="Size (e.g. S, M, L)" class="w-full p-4 border rounded-2xl mb-4">
      <input id="color" placeholder="Color (e.g. Black, Red)" class="w-full p-4 border rounded-2xl mb-4">
      <textarea id="desc" placeholder="Description" class="w-full p-4 border rounded-2xl mb-6 h-32"></textarea>
      <input type="file" id="image-input" accept="image/*" multiple>
      <div id="modal-preview" class="mt-4 grid grid-cols-3 gap-2"></div>
      <div class="flex gap-4 mt-10">
        <button onclick="saveProduct()" class="flex-1 bg-black text-white py-5 rounded-2xl">Save Product</button>
        <button onclick="closeModal()" class="flex-1 bg-gray-200 py-5 rounded-2xl">Cancel</button>
      </div>
    </div>
  </div>
  <script>
    let products = JSON.parse(localStorage.getItem('td_products')) || [];
    let currentImages = [];
    function renderProducts() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = '';
      products.forEach((p, i) => {
        const mainImg = p.images && p.images.length ? p.images[0] : 'https://picsum.photos/id/180/400/300';
        const div = document.createElement('div');
        div.className = "bg-white rounded-3xl p-6 shadow";
        div.innerHTML = `
          <img src="${mainImg}" class="w-full h-48 object-cover rounded-2xl mb-4">
          <h4 class="font-semibold">${p.name}</h4>
          <p class="text-pink-600">${p.price} LAK</p>
          <p class="text-xs text-gray-500">Category: ${p.category}</p>
          <div class="flex gap-3 mt-6">
            <button onclick="deleteProduct(${i})" class="flex-1 bg-red-100 text-red-600 py-3 rounded-xl">Delete</button>
          </div>
        `;
        grid.appendChild(div);
      });
    }
    function showAddForm() {
      currentImages = [];
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal-preview').innerHTML = '';
    }
    document.getElementById('image-input').addEventListener('change', function(e) {
      for (let file of e.target.files) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          currentImages.push(ev.target.result);
          const preview = document.getElementById('modal-preview');
          const img = document.createElement('img');
          img.src = ev.target.result;
          img.className = "h-24 w-full object-cover rounded-xl";
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      }
    });
    function saveProduct() {
      const name = document.getElementById('name').value.trim();
      if (!name) return alert("Name required");
      const product = {
        id: Date.now(), // This fixes the ID problem
        name: name,
        price: document.getElementById('price').value || "0",
        category: document.getElementById('category').value,
        size: document.getElementById('size').value,
        color: document.getElementById('color').value,
        desc: document.getElementById('desc').value,
        images: currentImages.length ? currentImages : ["https://picsum.photos/id/180/400/300"]
      };
      products.push(product);
      localStorage.setItem('td_products', JSON.stringify(products));
      closeModal();
      renderProducts();
      alert("Product saved!");
    }
    function deleteProduct(i) {
      if(confirm("Delete?")) {
        products.splice(i, 1);
        localStorage.setItem('td_products', JSON.stringify(products));
        renderProducts();
      }
    }
    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }
    renderProducts();
  </script>
</body>
</html>
