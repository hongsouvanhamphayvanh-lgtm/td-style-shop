<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TD Style Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">
    <div class="flex justify-center mb-8">
      <h1 class="text-4xl font-bold">TD <span class="text-pink-600">Style</span></h1>
    </div>

    <!-- Tab -->
    <div class="flex mb-8 border-b">
      <button onclick="switchTab(0)" id="tab-login" class="flex-1 py-4 font-semibold border-b-2 border-pink-600 text-pink-600">Login</button>
      <button onclick="switchTab(1)" id="tab-signup" class="flex-1 py-4 font-semibold text-gray-500">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <input id="login-username" placeholder="Username" class="w-full p-4 border rounded-2xl mb-4">
      <input id="login-password" type="password" placeholder="Password" class="w-full p-4 border rounded-2xl mb-8">
      <button onclick="login()" class="w-full bg-black text-white py-5 rounded-2xl text-xl">Login</button>
    </div>

    <!-- Signup Form -->
    <div id="signup-form" class="hidden">
      <input id="signup-username" placeholder="Username" class="w-full p-4 border rounded-2xl mb-4">
      <input id="signup-password" type="password" placeholder="Password" class="w-full p-4 border rounded-2xl mb-4">
      <input id="signup-confirm" type="password" placeholder="Confirm Password" class="w-full p-4 border rounded-2xl mb-8">
      <button onclick="signup()" class="w-full bg-black text-white py-5 rounded-2xl text-xl">Sign Up</button>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab === 1);
      document.getElementById('signup-form').classList.toggle('hidden', tab === 0);
      document.getElementById('tab-login').classList.toggle('border-b-2', tab === 0);
      document.getElementById('tab-login').classList.toggle('text-pink-600', tab === 0);
      document.getElementById('tab-signup').classList.toggle('border-b-2', tab === 1);
      document.getElementById('tab-signup').classList.toggle('text-pink-600', tab === 1);
    }

    function login() {
      const user = document.getElementById('login-username').value;
      const pass = document.getElementById('login-password').value;
      if (user === 'admin' && pass === '1234') {
        window.location.href = "admin.html";
      } else {
        alert("Wrong credentials! Use admin / 1234");
      }
    }

    function signup() {
      const user = document.getElementById('signup-username').value;
      const pass = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      if (pass !== confirm) {
        alert("Passwords do not match!");
        return;
      }
      if (user && pass) {
        alert("Sign Up Successful!\n\nUse admin / 1234 to login.");
        window.location.href = "login.html";
      }
    }
  </script>
</body>
</html>
