<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TD Style</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50">

  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <h1 class="text-4xl font-bold">TD <span class="text-pink-600">Style</span></h1>
      <nav class="flex gap-8 text-lg font-medium">
        <a href="#" onclick="filterCategory('all')" class="hover:text-pink-600">Shop All</a>
        <a href="#" onclick="filterCategory('clothes')" class="hover:text-pink-600">Clothes</a>
        <a href="#" onclick="filterCategory('dress')" class="hover:text-pink-600">Dresses</a>
        <a href="#" onclick="filterCategory('shoe')" class="hover:text-pink-600">Shoes</a>
        <a href="#" onclick="filterCategory('bag')" class="hover:text-pink-600">Bags</a>
        <a href="#" onclick="filterCategory('belt')" class="hover:text-pink-600">Belts</a>
        <a href="#" onclick="filterCategory('jewelry')" class="hover:text-pink-600">Necklaces & Bracelets</a>
      </nav>
      <div class="flex items-center gap-6 text-2xl">
        <i onclick="toggleCartDrawer()" class="fa-solid fa-shopping-cart cursor-pointer relative">
          <span id="cart-count" class="absolute -top-2 -right-2 bg-pink-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
        </i>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="h-screen flex items-center text-white relative" style="background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('https://picsum.photos/id/1015/2000/1200'); background-size: cover;">
    <div class="max-w-4xl mx-auto text-center px-6">
      <h2 class="text-7xl font-bold mb-6">TD Style</h2>
      <p class="text-3xl">Elegant Fashion</p>
    </div>
  </section>

  <!-- Products -->
  <section class="max-w-7xl mx-auto px-6 py-16">
    <h2 class="text-4xl font-bold text-center mb-12">Our Products</h2>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8" id="product-container"></div>
  </section>

  <!-- Cart Drawer -->
  <div id="cart-drawer" class="fixed top-0 right-0 h-full w-96 bg-white shadow-2xl transform translate-x-full z-50 flex flex-col">
    <div class="p-6 border-b flex justify-between items-center">
      <h3 class="text-2xl font-bold">Your Cart</h3>
      <i onclick="toggleCartDrawer()" class="fa-solid fa-xmark text-3xl cursor-pointer"></i>
    </div>
    <div id="cart-items" class="flex-1 p-6 overflow-auto"></div>
    <div class="p-6 border-t">
      <div class="flex justify-between text-xl mb-6">
        <span>Total</span>
        <span id="cart-total" class="font-bold">0 LAK</span>
      </div>
      <button onclick="checkout()" class="w-full bg-black text-white py-5 rounded-2xl text-lg">Proceed to Checkout</button>
    </div>
  </div>

  <script>
    function loadProducts(filtered = null) {
      let products = JSON.parse(localStorage.getItem('td_products')) || [];
      const container = document.getElementById('product-container');
      container.innerHTML = '';
      if (filtered && filtered !== 'all') {
        products = products.filter(p => p.category === filtered);
      }
      if (products.length === 0) {
        container.innerHTML = `<p class="col-span-full text-center py-20 text-gray-500">No products found.</p>`;
        return;
      }
      products.forEach(product => {
        const mainImg = product.images && product.images.length ? product.images[0] : (product.img || 'https://picsum.photos/id/180/400/300');
        const div = document.createElement('div');
        div.className = "bg-white rounded-3xl overflow-hidden shadow hover:shadow-xl cursor-pointer";
        div.innerHTML = `
          <img src="${mainImg}" class="w-full h-64 object-cover">
          <div class="p-6">
            <h3 class="font-semibold text-lg">${product.name}</h3>
            <p class="text-pink-600 font-medium">${product.price} LAK</p>
            <button onclick="window.location.href='product.html?id=${product.id}'" class="mt-6 w-full bg-black hover:bg-pink-600 text-white py-4 rounded-2xl">
              View Details
            </button>
          </div>
        `;
        container.appendChild(div);
      });
    }
    function filterCategory(cat) {
      loadProducts(cat);
    }
    function toggleCartDrawer() {
      const drawer = document.getElementById('cart-drawer');
      if (drawer.classList.contains('translate-x-full')) {
        renderCart();
        drawer.classList.remove('translate-x-full');
      } else {
        drawer.classList.add('translate-x-full');
      }
    }
    function renderCart() {
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;
      let cart = JSON.parse(localStorage.getItem('td_cart')) || [];
      if (cart.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500 py-10">Your cart is empty.</p>';
        document.getElementById('cart-total').textContent = '0 LAK';
        return;
      }
      cart.forEach((item, index) => {
        total += parseInt(item.price) || 0;
        const div = document.createElement('div');
        div.className = "flex gap-4 mb-6";
        div.innerHTML = `
          <img src="${item.images && item.images.length ? item.images[0] : item.img}" class="w-20 h-20 object-cover rounded-xl">
          <div class="flex-1">
            <h4>${item.name}</h4>
            <p class="text-pink-600">${item.price} LAK</p>
            <button onclick="removeFromCart(${index})" class="text-red-500 text-sm">Remove</button>
          </div>
        `;
        container.appendChild(div);
      });
      document.getElementById('cart-total').textContent = total + " LAK";
      document.getElementById('cart-count').textContent = cart.length;
    }
    function removeFromCart(index) {
      let cart = JSON.parse(localStorage.getItem('td_cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('td_cart', JSON.stringify(cart));
      renderCart();
    }
    function checkout() {
      let cart = JSON.parse(localStorage.getItem('td_cart')) || [];
      if(cart.length === 0) return alert("Cart is empty!");
      alert("Thank you for shopping at TD Style! (Demo mode)");
      cart = [];
      localStorage.setItem('td_cart', JSON.stringify(cart));
      toggleCartDrawer();
    }
    loadProducts('all');
  </script>
</body>
</html>
