<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - TD Style</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto px-6 py-12">
    <a href="index.html" class="text-pink-600 hover:underline mb-8 inline-block">← Back to Shop</a>
    <h1 class="text-4xl font-bold mb-8">Checkout</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
      <div>
        <h2 class="text-2xl font-semibold mb-6">Shipping Information</h2>
        <input type="text" placeholder="Full Name" class="w-full p-4 border rounded-2xl mb-4">
        <input type="text" placeholder="Address" class="w-full p-4 border rounded-2xl mb-4">
        <input type="text" placeholder="City" class="w-full p-4 border rounded-2xl mb-4">
        <input type="text" placeholder="Phone Number" class="w-full p-4 border rounded-2xl mb-4">
      </div>

      <div>
        <h2 class="text-2xl font-semibold mb-6">Order Summary</h2>
        <div id="order-summary" class="bg-white p-6 rounded-3xl mb-6"></div>
        <div class="flex justify-between text-xl font-bold mb-6">
          <span>Total</span>
          <span id="total-price">0 LAK</span>
        </div>
        <button onclick="completeOrder()" class="w-full bg-black text-white py-6 rounded-2xl text-xl">
          Pay with Dukascopy / Payoneer
        </button>
      </div>
    </div>
  </div>

  <script>
    let cart = JSON.parse(localStorage.getItem('td_cart')) || [];
    const summary = document.getElementById('order-summary');
    let total = 0;

    cart.forEach(item => {
      total += parseInt(item.price) || 0;
      const div = document.createElement('div');
      div.className = "flex gap-4 mb-6";
      div.innerHTML = `
        <img src="${item.images && item.images.length ? item.images[0] : item.img}" class="w-16 h-16 object-cover rounded-xl">
        <div>
          <h4>${item.name}</h4>
          <p class="text-pink-600">${item.price} LAK</p>
        </div>
      `;
      summary.appendChild(div);
    });

    document.getElementById('total-price').textContent = total + " LAK";

    function completeOrder() {
      alert("Payment Successful!\n\nThank you for shopping at TD Style.\nOrder ID: TD" + Date.now());
      localStorage.setItem('td_cart', JSON.stringify([]));
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
